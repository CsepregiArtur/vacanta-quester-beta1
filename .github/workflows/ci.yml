name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ─── Test ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vacanta_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/vacanta_test
          NODE_ENV: test

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ─── Build ─────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/

  # ─── Deploy (declanșat de GitHub Webhook, nu de GitHub Actions) ───
  # Deploy-ul se face automat prin GitHub Webhook → Proxmox LXC.
  # La fiecare push pe main, GitHub trimite un POST la:
  #   https://vacanta.cs-hub.xyz/webhook
  # Un server Flask (port 9000) primește webhook-ul și rulează:
  #   server/scripts/webhook-server/deploy.sh
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Webhook deploy status
        run: |
          echo "✅ Testele + build-ul au trecut."
          echo "🌐 Webhook-ul GitHub va declanșa automat deploy-ul pe LXC."
          echo "📡 URL: https://vacanta.cs-hub.xyz/webhook"
          echo ""
          echo "🔍 Verifică deployment status:"
          echo "   systemctl status vq-webhook"
          echo "   journalctl -u vq-webhook -n 20 --no-pager"